# One-click Render setup for the 24/7 signal service (alert-only).
# In Render: New + → "Blueprint" → point at this repo → it reads this file.
# It creates ONE always-on web service that (a) runs the scan loop 24/7 and
# pushes Telegram alerts, and (b) serves a live dashboard at your public URL.
# Then set the secret env vars (TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID) in the
# dashboard. The 1 GB disk keeps the signal history across redeploys.
services:
  - type: web
    name: crypto-signal-worker
    runtime: python
    plan: starter            # cheapest always-on tier (no sleep)
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -t 120 -b 0.0.0.0:$PORT web_dashboard:app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # set in the dashboard (secret)
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WORKER_INTERVAL_MIN
        value: "5"
      - key: WORKER_ALERT_COOLDOWN_MIN
        value: "360"
      - key: WORKER_DB_PATH
        value: /var/data/worker.db
    disk:
      name: worker-data
      mountPath: /var/data
      sizeGB: 1
